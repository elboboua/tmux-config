# UI settings
set-option -sa terminal-overrides ",xterm*:Tc"

set -g mouse on
set -g status-left-length 30
setw -g mode-keys vi
set -g history-limit 102400
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind-key g command-prompt -p "switch to session:" "switch-client -t '%%'"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-boot-options 'iterm'
set -g @plugin 'catppuccin/tmux'
# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
# leave this unset to let applications set the window title
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_status "icon"
set -g @catppuccin_window_current_background "#{@thm_mauve}"
set -g @catppuccin_status_right_separator ""
set -g status-left "#{E:@catppuccin_status_session}#[default] "
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{@catppuccin_status_gitmux}"

# update status every 2 seconds
set -g status-interval 2

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# Pull repo down from github: `git clone https://github.com/tmux-plugins/tpm.git ~/.tmux/plugins/tpm`
run '~/.tmux/plugins/tpm/tpm'
